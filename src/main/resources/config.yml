    - "%d §5Endermen wanted to steal your dirt. We stopped them."
    - "%d §5Endermen were intercepted mid-grab. Justice served."
    - "%d §5Endermen tried to start a landscaping business. We shut it down."
    - "%d §5Endermen thought they were Minecraft decorators. We disagreed."
    - "%d §5Endermen attempted a hostile home makeover. Denied."
    - "%d §5Endermen tried to steal your blocks for their NFT collection."
    - "%d §5Endermen were caught loitering with intent to rearrange dirt."
    - "%d §5Endermen thought griefing was a personality trait. We corrected them."
    - "%d §5Endermen applied for block relocation permits. All denied."
