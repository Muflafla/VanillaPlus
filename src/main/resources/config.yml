# VanillaPlus Configuration

# ==========================================================
#               Login msg's and fireworks
# ==========================================================
#Will launch some fireworks where player spawned. (can lagg on lesser hardware)
Enable-Login-Fireworks: true
#Set this to false to disable login messages.
Show-Login-Messages: true
#Set your own login Massages.
Login-Messages:
    - "§aWelcome to the server! %s"
    - "§aHello there %s"

#Set this to false to disable Player specific login messages.
Show-Player-Specific-Login-Messages: true

#Here we can set custom messages.
Custom-Player-Messages:
    muflafla: #<-- this one is for show.
        Player-UUID: "bbdf8cf3-020e-4367-96eb-52e459388de9"
        Custom-Messages:
            - "§aWelcome"
            - "§aHere again?"


# ==========================================================
#                   AUTO BAN FEATURE
# ==========================================================
#If this is enabled it will automatically ban anyone that joins that was not on the whitelist, So they'll be instantly greeted with a ban screen when trying to join.
Ban-On-Join: true
Ban-Reason: "You where not whitelisted"
# ==========================================================
#                   creepers/enderman
# ==========================================================
#If this is enabled creepers don't spawn at all
Disable-Creeper-Spawn: false
#If this is enabled creepers won't explode at all.
Disable-Creeper-Explosions: false
#If this is enabled it wil stop creepers from blowing up blocks, but it wil still damage players.
Disable-Creeper-Block-Damage: false
#If this is enabled and a creeper explodes it will still damage the player and blow up blocks but give all the block back.
Creeper-Gives-all-Blocks: true
#If this is enabled it wil stop enderman from picking up blocks
Stop-Enderman-From-Griefing: true
# Set this to false to stop the Enderman messages from showing up.
Show-Enderman-Messages: true
# You can add or remove messages here. Use %d where the number of Endermen should go.
Enderman-Messages:
    - "%d §5Endermen tried to redecorate your world. Denied."
