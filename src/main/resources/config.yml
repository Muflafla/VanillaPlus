# ==========================================================
# HORROR SETTINGS
# ==========================================================
# If set to true, the plugin will occasionally play ghost sounds,
# spawn fake entities, and send 'creepy' messages to random players.
# This is a purely cosmetic psychological horror feature.
Enable-Creepy-Stuff: false

# ==========================================================
#                          Beacons
# ==========================================================
#Enables the increased beacon radius
Enable-Beacon-Changes: true
#Sets the beacon radius
Beacon-Radius: 150

# ==========================================================
# CUSTOM RECIPE CONFIGURATION
# ==========================================================
# 1. 'Result' must be a valid Minecraft Material name.
# 2. 'Shape' is a 3x3 grid. Each line is one row of the crafting table.
# 3. 'Ingredients' maps the letters in your shape to items.
# 4. Use " " for empty slots, Aka just use a space.
# ==========================================================

Enable-Custom-Recipes: true

Custom-Recipes:
    Explanation-ITEM: # <--- This name you can set this to whatever aslong as it's not the same as wats already used in other items, for now its Explanation-ITEM because this item is for explaination.
        Result: "DIRT" # <--- The item you want crafted with your new recipe.
        Amount: 1 #<--- The amount you get in game.
        Display-Name: "&6The Holy Dirt of the Void" # <--- Custom Name! (Supports & color codes). if nothing is set here it wil use the default in game name.
        Player-Head-Name: #<--- if there is a player name here it wil create a player head named this, for heads the result must be set to PLAYER_HEAD
        # Visual Guide:
        #  [Slot A] [Slot A] [Slot A]
        #  [Slot B] [Slot C] [Slot B]
        #  [Slot D] [Slot D] [Slot D]
        Shape:
            - "ABC"
            - "DEF"
            - "GHI"
        # Define what each letter represents (up to 9 unique items) for an empty slot use AIR.
        Ingredients:
            A: "NETHERITE_BLOCK"
            B: "DIAMOND_BLOCK"
            C: "EMERALD_BLOCK"
            D: "NETHER_STAR"
            E: "DRAGON_EGG"
            F: "BEACON"
            G: "DRAGON_BREATH"
            H: "TOTEM_OF_UNDYING"
            I: "ENCHANTED_GOLDEN_APPLE"



